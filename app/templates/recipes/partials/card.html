<a href="{{ url_for('recipes.detail', recipe_id=recipe.id) }}" class="recipe-card">
    <div class="card-image">
        {% if recipe.image_path %}
        <img src="{{ url_for('recipes.uploaded_file', filename='thumbs/' + recipe.image_path) }}"
             alt="{{ recipe.title }}" loading="lazy">
        {% else %}
        <div class="card-image-placeholder">&#127860;</div>
        {% endif %}
    </div>
    <div class="card-body">
        <h3 class="card-title">{{ recipe.title }}</h3>
        {% if recipe_tags and recipe_tags.get(recipe.id) %}
        <div class="card-tags">
            {% for tag in recipe_tags[recipe.id] %}<span class="card-tag">{{ tag.name }}</span>{% endfor %}
        </div>
        {% endif %}
    </div>
</a>
