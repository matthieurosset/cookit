{% extends "base.html" %}
{% block title %}Importer une recette - Cookit{% endblock %}

{% block content %}
<div class="form-page">
    <h1>Importer une recette</h1>
    <p class="form-help">Collez l'URL d'une recette (Marmiton, 750g, etc.) pour l'importer automatiquement.</p>

    <form method="POST" class="import-form">
        <div class="form-group">
            <label for="url">URL de la recette</label>
            <input type="url" id="url" name="url" required
                   placeholder="https://www.marmiton.org/recettes/..."
                   class="input-lg">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Importer</button>
            <a href="{{ url_for('recipes.index') }}" class="btn btn-secondary">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
