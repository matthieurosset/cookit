{% if tags %}
<div class="tag-manage-list">
    {% for tag in tags %}
    <div class="tag-manage-item">
        <span class="tag-badge">{{ tag.name }}</span>
        <span class="tag-count">{{ tag.recipe_count }} recette{{ 's' if tag.recipe_count != 1 }}</span>
        <form method="POST"
              hx-post="{{ url_for('tags.delete', tag_id=tag.id) }}"
              hx-target="#tag-list"
              hx-swap="innerHTML"
              hx-confirm="Supprimer le tag « {{ tag.name }} » ?">
            <button type="submit" class="btn btn-icon btn-remove" title="Supprimer">&times;</button>
        </form>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="empty-state">
    <p>Aucun tag. Créez-en un ci-dessus.</p>
</div>
{% endif %}
