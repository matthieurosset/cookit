{% extends "base.html" %}
{% block title %}Tags - Cookit{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Tags</h1>
</div>

<form class="inline-form"
      hx-post="{{ url_for('tags.create') }}"
      hx-target="#tag-list"
      hx-swap="innerHTML"
      hx-on::after-request="this.reset()">
    <input type="text" name="name" placeholder="Nouveau tag..." required class="input-grow">
    <button type="submit" class="btn btn-primary btn-sm">Ajouter</button>
</form>

<div id="tag-list">
    {% include "tags/partials/tag_list.html" %}
</div>
{% endblock %}
