{% macro render_item(item) %}
<div class="shopping-item {% if item.checked %}checked{% endif %}">
    <label class="shopping-checkbox"
           hx-patch="{{ url_for('shopping.toggle_item', item_id=item.id) }}"
           hx-target="#shopping-items"
           hx-swap="innerHTML">
        <input type="checkbox" {% if item.checked %}checked{% endif %}>
        <span class="checkmark"></span>
        <span class="item-text">
            {% if item.quantity %}<strong>{{ item.quantity }}</strong>{% endif %}
            {% if item.unit %}{{ item.unit }}{% endif %}
            {{ item.name }}
        </span>
    </label>
    <button class="btn btn-icon btn-remove"
            hx-delete="{{ url_for('shopping.delete_item', item_id=item.id) }}"
            hx-target="#shopping-items"
            hx-swap="innerHTML"
            title="Supprimer"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4h12M5.33 4V2.67a1.33 1.33 0 011.34-1.34h2.66a1.33 1.33 0 011.34 1.34V4M13 4v9.33a1.33 1.33 0 01-1.33 1.34H4.33A1.33 1.33 0 013 13.33V4"/></svg></button>
</div>
{% endmacro %}

{% if all_items %}
<div style="display: flex; justify-content: flex-end; margin-bottom: var(--space-sm);">
    <form method="POST" action="{{ url_for('shopping.clear_all') }}"
          hx-post="{{ url_for('shopping.clear_all') }}"
          hx-target="#shopping-items"
          hx-swap="innerHTML"
          hx-confirm="Vider toute la liste ?">
        <button type="submit" class="btn btn-danger">Tout vider</button>
    </form>
</div>

{% for item in all_items %}
{{ render_item(item) }}
{% endfor %}

{% else %}
<div class="empty-state">
    <p>Liste vide. Ajoutez des articles ci-dessus.</p>
</div>
{% endif %}
