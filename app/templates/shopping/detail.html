{% extends "base.html" %}
{% block title %}{{ list.name }} - Courses - Cookit{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ list.name }}</h1>
    <div class="page-actions">
        <form method="POST" action="{{ url_for('shopping.clear_checked', list_id=list.id) }}"
              hx-post="{{ url_for('shopping.clear_checked', list_id=list.id) }}"
              hx-target="#shopping-items"
              hx-swap="innerHTML">
            <button type="submit" class="btn btn-secondary btn-sm">Vider les coches</button>
        </form>
        <form method="POST" action="{{ url_for('shopping.delete_list', list_id=list.id) }}"
              onsubmit="return confirm('Supprimer cette liste ?')">
            <button type="submit" class="btn btn-danger btn-sm">Supprimer la liste</button>
        </form>
    </div>
</div>

<!-- Add free item -->
<form class="inline-form"
      hx-post="{{ url_for('shopping.add_item', list_id=list.id) }}"
      hx-target="#shopping-items"
      hx-swap="innerHTML"
      hx-on::after-request="this.reset()">
    <input type="text" name="quantity" placeholder="Qte" class="input-xs">
    <input type="text" name="unit" placeholder="Unite" class="input-xs">
    <input type="text" name="name" placeholder="Article..." required class="input-grow">
    <button type="submit" class="btn btn-primary btn-sm">Ajouter</button>
</form>

<!-- Add from recipe -->
<details class="add-recipe-section">
    <summary class="btn btn-secondary btn-sm">+ Ajouter depuis une recette</summary>
    <form class="inline-form"
          hx-post="{{ url_for('shopping.add_recipe', list_id=list.id) }}"
          hx-target="#shopping-items"
          hx-swap="innerHTML">
        <select name="recipe_id" required class="input-grow">
            <option value="">Choisir une recette...</option>
            {% for r in recipes %}
            <option value="{{ r.id }}">{{ r.title }}</option>
            {% endfor %}
        </select>
        <input type="number" name="portions" placeholder="Portions" min="1" class="input-xs">
        <button type="submit" class="btn btn-primary btn-sm">Ajouter</button>
    </form>
</details>

<div id="shopping-items">
    {% include "shopping/partials/items.html" %}
</div>

<a href="{{ url_for('shopping.index') }}" class="btn btn-secondary back-link">&#8592; Retour aux listes</a>
{% endblock %}
