{% extends "base.html" %}
{% block title %}Courses - Cookit{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Courses</h1>
    <div class="page-actions">
        <form method="POST" action="{{ url_for('shopping.clear_all') }}"
              hx-post="{{ url_for('shopping.clear_all') }}"
              hx-target="#shopping-items"
              hx-swap="innerHTML"
              hx-confirm="Vider toute la liste ?">
            <button type="submit" class="btn btn-danger btn-sm">Tout vider</button>
        </form>
    </div>
</div>

<form class="inline-form" id="add-item-form"
      hx-post="{{ url_for('shopping.add_item') }}"
      hx-target="#shopping-items"
      hx-swap="innerHTML"
      hx-on::after-request="this.reset(); document.getElementById('input-qty').value=''; document.getElementById('autocomplete-dropdown').classList.remove('show');">
    <div class="qty-input-controls">
        <button type="button" class="btn-qty" onclick="adjustQty(-1)">&minus;</button>
        <input type="text" name="quantity" id="input-qty" value="" class="qty-display" size="2" readonly>
        <button type="button" class="btn-qty" onclick="adjustQty(1)">&plus;</button>
    </div>
    <input type="text" name="unit" placeholder="Unité" class="input-xs" id="input-unit">
    <div class="autocomplete-wrapper">
        <input type="text" name="name" placeholder="Article..." required class="input-grow" id="input-name"
               autocomplete="off">
        <div class="autocomplete-dropdown" id="autocomplete-dropdown"></div>
    </div>
    <button type="submit" class="btn btn-primary btn-sm">Ajouter</button>
</form>

{% if frequent %}
<div class="frequent-items" id="frequent-items">
    {% for item in frequent %}
    <button type="button" class="frequent-btn"
            data-name="{{ item.name }}"
            data-quantity="{{ item.quantity }}"
            data-unit="{{ item.unit }}">{{ item.name }}</button>
    {% endfor %}
</div>
{% endif %}

<button type="button" class="btn btn-secondary btn-sm" style="margin-bottom: var(--space-lg)" onclick="openRecipeModal()">+ Ajouter depuis une recette</button>

<div class="modal-overlay" id="recipe-modal" onclick="if(event.target===this)closeRecipeModal()">
    <div class="modal">
        <div class="modal-header">
            <h3>Ajouter depuis une recette</h3>
            <button type="button" class="btn btn-icon" onclick="closeRecipeModal()">&times;</button>
        </div>
        <form class="modal-body"
              hx-post="{{ url_for('shopping.add_recipe') }}"
              hx-target="#shopping-items"
              hx-swap="innerHTML"
              hx-on::after-request="closeRecipeModal()">
            <select name="recipe_id" required class="input-grow">
                <option value="">Choisir une recette...</option>
                {% for r in recipes %}
                <option value="{{ r.id }}">{{ r.title }}</option>
                {% endfor %}
            </select>
            <div class="qty-input-controls" style="align-self: flex-start">
                <button type="button" class="btn-qty" onclick="adjustPortions(-1)">&minus;</button>
                <input type="text" name="portions" id="input-portions" value="1" class="qty-display" size="1" readonly>
                <button type="button" class="btn-qty" onclick="adjustPortions(1)">&plus;</button>
                <span class="portions-label">portion(s)</span>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary btn-sm" onclick="closeRecipeModal()">Annuler</button>
                <button type="submit" class="btn btn-primary btn-sm">Ajouter</button>
            </div>
        </form>
    </div>
</div>

<div id="shopping-items">
    {% include "shopping/partials/items.html" %}
</div>
{% endblock %}
