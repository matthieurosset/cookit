{% extends "base.html" %}
{% block title %}Courses - Cookit{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Courses</h1>
    <div class="page-actions">
        <form method="POST" action="{{ url_for('shopping.clear_checked') }}"
              hx-post="{{ url_for('shopping.clear_checked') }}"
              hx-target="#shopping-items"
              hx-swap="innerHTML">
            <button type="submit" class="btn btn-secondary btn-sm">Retirer les cochés</button>
        </form>
        <form method="POST" action="{{ url_for('shopping.clear_all') }}"
              hx-post="{{ url_for('shopping.clear_all') }}"
              hx-target="#shopping-items"
              hx-swap="innerHTML"
              hx-confirm="Vider toute la liste ?">
            <button type="submit" class="btn btn-danger btn-sm">Tout vider</button>
        </form>
    </div>
</div>

<form class="inline-form" id="add-item-form"
      hx-post="{{ url_for('shopping.add_item') }}"
      hx-target="#shopping-items"
      hx-swap="innerHTML"
      hx-on::after-request="this.reset(); document.getElementById('autocomplete-dropdown').classList.remove('show');">
    <input type="text" name="quantity" placeholder="Qté" class="input-xs" id="input-qty">
    <input type="text" name="unit" placeholder="Unité" class="input-xs" id="input-unit">
    <div class="autocomplete-wrapper">
        <input type="text" name="name" placeholder="Article..." required class="input-grow" id="input-name"
               autocomplete="off">
        <div class="autocomplete-dropdown" id="autocomplete-dropdown"></div>
    </div>
    <button type="submit" class="btn btn-primary btn-sm">Ajouter</button>
</form>

{% if frequent %}
<div class="frequent-items" id="frequent-items">
    {% for item in frequent %}
    <button type="button" class="frequent-btn"
            data-name="{{ item.name }}"
            data-quantity="{{ item.quantity }}"
            data-unit="{{ item.unit }}">{{ item.name }}</button>
    {% endfor %}
</div>
{% endif %}

<details class="add-recipe-section">
    <summary class="btn btn-secondary btn-sm">+ Ajouter depuis une recette</summary>
    <form class="inline-form"
          hx-post="{{ url_for('shopping.add_recipe') }}"
          hx-target="#shopping-items"
          hx-swap="innerHTML">
        <select name="recipe_id" required class="input-grow">
            <option value="">Choisir une recette...</option>
            {% for r in recipes %}
            <option value="{{ r.id }}">{{ r.title }}</option>
            {% endfor %}
        </select>
        <input type="number" name="portions" placeholder="Portions" min="1" class="input-xs">
        <button type="submit" class="btn btn-primary btn-sm">Ajouter</button>
    </form>
</details>

<div id="shopping-items">
    {% include "shopping/partials/items.html" %}
</div>
{% endblock %}
