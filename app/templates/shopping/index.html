{% extends "base.html" %}
{% block title %}Courses - Cookit{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Courses</h1>
</div>

<form class="inline-form" id="add-item-form"
      hx-post="{{ url_for('shopping.add_item') }}"
      hx-target="#shopping-items"
      hx-swap="innerHTML"
      hx-on::after-request="this.reset(); document.getElementById('input-qty-unit').value=''; syncQtyUnit(); document.getElementById('autocomplete-dropdown').classList.remove('show');">
    <div class="qty-input-controls">
        <button type="button" class="btn-qty" onclick="adjustQty(-1)">&minus;</button>
        <input type="text" id="input-qty-unit" placeholder="Qté" class="qty-unit-display" autocomplete="off" oninput="syncQtyUnit()">
        <button type="button" class="btn-qty" onclick="adjustQty(1)">&plus;</button>
    </div>
    <input type="hidden" name="quantity" id="hidden-qty">
    <input type="hidden" name="unit" id="hidden-unit">
    <div class="autocomplete-wrapper">
        <input type="text" name="name" placeholder="Article..." required class="input-grow" id="input-name"
               autocomplete="off">
        <div class="autocomplete-dropdown" id="autocomplete-dropdown"></div>
    </div>
    <button type="submit" class="btn btn-primary">Ajouter</button>
</form>

<div id="shopping-items">
    {% include "shopping/partials/items.html" %}
</div>
{% endblock %}
